<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav>
        <ul>
          <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
          <li><a href="{{ '/daily-log/' | relative_url }}" {% if page.url contains 'daily-log' %}class="active"{% endif %}>Daily Log</a></li>
          <li><a href="{{ '/research/' | relative_url }}" {% if page.url contains 'research' %}class="active"{% endif %}>Research</a></li>
          <li><a href="{{ '/projects/' | relative_url }}" {% if page.url contains 'projects' %}class="active"{% endif %}>Projects</a></li>
          <li><a href="{{ '/interests/' | relative_url }}" {% if page.url contains 'interests' %}class="active"{% endif %}>Interests</a></li>
          <li><a href="{{ '/about/' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>
  <footer>
    <div class="footer-content">
      <p>© {{ 'now' | date: "%Y" }} {{ site.author }}. Built with Jekyll.</p>
      <p><a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
    </div>
  </footer>
  {% include ai-chat-assistant.html %}
</body>
</html>
